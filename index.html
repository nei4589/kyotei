<html lang="ja"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

<title>競艇AI予想サポート</title>
<meta name="robots" content="noindex,nofollow">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#080c14;--s1:#0f1623;--s2:#161f30;--s3:#1c2840;
  --border:#1e3558;--accent:#00d4ff;--accent2:#ff6b00;
  --gold:#ffd700;--green:#22c55e;--red:#ef4444;--purple:#a855f7;
  --text:#e8edf5;--dim:#5a7298;
}
body{font-family:'Hiragino Sans','Meiryo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;
  background-image:radial-gradient(ellipse at 10% 20%,rgba(0,212,255,.05) 0%,transparent 50%),
  radial-gradient(ellipse at 90% 80%,rgba(255,107,0,.04) 0%,transparent 50%);}

/* HEADER */
header{background:var(--s1);border-bottom:1px solid var(--border);padding:10px 20px;
  display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;
  position:sticky;top:0;z-index:100;backdrop-filter:blur(10px);}
.logo{display:flex;align-items:center;gap:8px;}
.logo-mark{width:30px;height:30px;background:linear-gradient(135deg,var(--accent),var(--accent2));
  border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:16px;}
.logo-text{font-size:15px;font-weight:900;}
.logo-text em{color:var(--accent);font-style:normal;}
.badges{display:flex;gap:6px;align-items:center;}
.badge{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:700;}
.badge-live{background:rgba(34,197,94,.15);border:1px solid var(--green);color:var(--green);}
.badge-date{background:var(--s2);border:1px solid var(--border);color:var(--dim);}

/* WRAP */
.wrap{max-width:1000px;margin:0 auto;padding:16px 12px;}

/* SELECTOR */
.selector{background:var(--s1);border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:14px;}
.sec-title{font-size:12px;color:var(--dim);letter-spacing:.1em;margin-bottom:12px;font-weight:700;}
.sel-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px;}
.sel-grp{display:flex;flex-direction:column;gap:4px;flex:1;min-width:100px;}
.sel-grp label{font-size:11px;color:var(--dim);}
.sel-grp select{background:var(--s2);border:1px solid var(--border);border-radius:8px;
  padding:9px 10px;color:var(--text);font-size:14px;font-weight:700;cursor:pointer;width:100%;}
.sel-grp select:focus{outline:none;border-color:var(--accent);}
.load-btn{width:100%;padding:13px;background:linear-gradient(135deg,var(--accent),#007fa8);
  border:none;border-radius:10px;color:#000;font-size:15px;font-weight:900;cursor:pointer;transition:all .2s;}
.load-btn:hover{opacity:.9;transform:translateY(-1px);}
.load-btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}

/* RACE HEAD */
.race-head{background:var(--s1);border:1px solid var(--border);border-radius:14px;
  padding:16px 18px;margin-bottom:12px;}
.race-name{font-size:20px;font-weight:900;color:var(--accent);margin-bottom:4px;}
.race-sub{font-size:12px;color:var(--dim);margin-bottom:10px;}
.chips{display:flex;gap:7px;flex-wrap:wrap;}
.chip{background:var(--s2);border:1px solid var(--border);border-radius:6px;padding:3px 9px;font-size:12px;color:var(--dim);}
.chip strong{color:var(--text);}
.chip.warn{border-color:var(--accent2);color:var(--accent2);}
.chip.info{border-color:var(--accent);color:var(--accent);}

/* TABLE */
.tbl-wrap{overflow-x:auto;margin-bottom:12px;}
.boat-table{width:100%;border-collapse:collapse;background:var(--s1);
  border-radius:14px;overflow:hidden;border:1px solid var(--border);min-width:700px;}
.boat-table th{background:var(--s2);font-size:10px;color:var(--dim);
  padding:7px 8px;text-align:center;font-weight:700;letter-spacing:.05em;white-space:nowrap;}
.boat-table td{padding:9px 8px;text-align:center;border-top:1px solid var(--border);font-size:13px;white-space:nowrap;}
.boat-table tr:hover td{background:rgba(0,212,255,.02);}
.ln{width:32px;height:32px;border-radius:6px;display:inline-flex;align-items:center;
  justify-content:center;font-size:16px;font-weight:900;font-family:monospace;}
.l1{background:#e74c3c;color:#fff}.l2{background:#3498db;color:#fff}
.l3{background:#e67e22;color:#fff}.l4{background:#27ae60;color:#000}
.l5{background:#e91e8c;color:#fff}.l6{background:#2c3e50;color:#fff}
.rank{font-size:10px;padding:2px 5px;border-radius:3px;font-weight:700;}
.A1{background:rgba(255,215,0,.2);color:var(--gold);border:1px solid var(--gold);}
.A2{background:rgba(0,212,255,.15);color:var(--accent);border:1px solid var(--accent);}
.B1{background:rgba(90,114,152,.15);color:#8fa8c8;border:1px solid #2a3a50;}
.B2{background:rgba(60,80,110,.1);color:#5a7298;border:1px solid #1e2e40;}
.bar{height:5px;background:var(--s3);border-radius:3px;overflow:hidden;width:55px;display:inline-block;vertical-align:middle;margin-left:4px;}
.bar-fill{height:100%;border-radius:3px;}
.bar-o{background:linear-gradient(90deg,var(--accent2),#cc3300);}
.bar-b{background:linear-gradient(90deg,var(--accent),#0066ff);}
.st-f{color:var(--green);font-weight:700;}
.st-s{color:var(--red);}
.st-m{color:var(--gold);}
.ex-top{color:var(--green);font-weight:700;}
.course-change{color:var(--accent2);font-weight:700;}

/* AI BOX */
.ai-box{background:var(--s1);border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:12px;}
.ai-head{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.ai-icon{width:34px;height:34px;background:linear-gradient(135deg,#7c3aed,#4f46e5);
  border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;}
.ai-ttl{font-size:14px;font-weight:900;}
.ai-ttl small{font-size:11px;color:var(--dim);font-weight:400;display:block;}
.ai-body{font-size:14px;line-height:1.9;white-space:pre-wrap;}
.spinner-wrap{display:flex;align-items:center;gap:10px;color:var(--dim);font-size:13px;}
.sp{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--accent);
  border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.api-warn{font-size:11px;color:var(--dim);background:var(--s2);border-radius:6px;
  padding:10px 12px;margin-top:10px;border:1px solid var(--border);line-height:1.6;}

/* BUDGET & BET */
.bet-box{background:var(--s1);border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:12px;}
.budget-row{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
.budget-row label{font-size:12px;color:var(--dim);white-space:nowrap;}
.budget-input{background:var(--s2);border:1px solid var(--border);border-radius:8px;
  padding:8px 12px;color:var(--text);font-family:monospace;font-size:16px;font-weight:700;
  width:140px;text-align:right;}
.budget-input:focus{outline:none;border-color:var(--accent);}
.qbtns{display:flex;gap:5px;flex-wrap:wrap;}
.qb{background:var(--s2);border:1px solid var(--border);border-radius:6px;
  padding:5px 10px;cursor:pointer;font-size:12px;color:var(--dim);transition:all .15s;}
.qb:hover{border-color:var(--accent);color:var(--accent);}

/* BET TYPES */
.bet-types{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:14px;}
.bt{background:var(--s2);border:1px solid var(--border);border-radius:8px;
  padding:9px 5px;cursor:pointer;text-align:center;transition:all .15s;
  color:var(--text);font-size:13px;font-weight:700;}
.bt:hover{border-color:var(--accent);}
.bt.on{background:rgba(0,212,255,.1);border-color:var(--accent);color:var(--accent);}
.bt small{font-size:10px;color:var(--dim);display:block;margin-top:2px;}
.bt.on small{color:rgba(0,212,255,.6);}

/* BOAT SELECTOR */
.boat-sel{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;}
.bs{width:44px;height:44px;border-radius:8px;border:2px solid transparent;
  cursor:pointer;font-size:17px;font-weight:900;font-family:monospace;
  display:flex;flex-direction:column;align-items:center;justify-content:center;transition:all .15s;}
.bs[data-l="1"]{background:rgba(231,76,60,.2);color:#e74c3c;border-color:rgba(231,76,60,.3);}
.bs[data-l="2"]{background:rgba(52,152,219,.2);color:#3498db;border-color:rgba(52,152,219,.3);}
.bs[data-l="3"]{background:rgba(230,126,34,.2);color:#e67e22;border-color:rgba(230,126,34,.3);}
.bs[data-l="4"]{background:rgba(39,174,96,.2);color:#27ae60;border-color:rgba(39,174,96,.3);}
.bs[data-l="5"]{background:rgba(233,30,140,.2);color:#e91e8c;border-color:rgba(233,30,140,.3);}
.bs[data-l="6"]{background:rgba(44,62,80,.4);color:#95a5a6;border-color:rgba(44,62,80,.5);}
.bs.on[data-l="1"]{background:rgba(231,76,60,.6);border-color:#e74c3c;color:#fff;}
.bs.on[data-l="2"]{background:rgba(52,152,219,.6);border-color:#3498db;color:#fff;}
.bs.on[data-l="3"]{background:rgba(230,126,34,.6);border-color:#e67e22;color:#fff;}
.bs.on[data-l="4"]{background:rgba(39,174,96,.6);border-color:#27ae60;color:#000;}
.bs.on[data-l="5"]{background:rgba(233,30,140,.6);border-color:#e91e8c;color:#fff;}
.bs.on[data-l="6"]{background:rgba(44,62,80,.9);border-color:#95a5a6;color:#fff;}
.bs .ord{font-size:8px;opacity:.9;}
.sel-hint{font-size:12px;color:var(--dim);margin-bottom:10px;min-height:16px;}

/* SLOTS */
.slots{margin-bottom:12px;}
.slot{display:flex;align-items:center;gap:8px;background:var(--s2);border:1px solid var(--border);
  border-radius:7px;padding:9px 12px;margin-bottom:6px;font-size:13px;}
.slot-tag{font-size:10px;padding:2px 6px;border-radius:4px;font-weight:700;white-space:nowrap;}
.tag-main{background:rgba(255,215,0,.2);border:1px solid var(--gold);color:var(--gold);}
.tag-sub{background:rgba(0,212,255,.15);border:1px solid var(--accent);color:var(--accent);}
.tag-kana{background:rgba(168,85,247,.15);border:1px solid var(--purple);color:var(--purple);}
.slot-info{flex:1;}
.slot-amt{font-family:monospace;color:var(--gold);font-size:12px;white-space:nowrap;}
.slot-del{background:none;border:none;color:var(--red);cursor:pointer;font-size:16px;padding:0 4px;opacity:.7;}
.slot-del:hover{opacity:1;}
.add-btn{width:100%;padding:9px;background:transparent;border:1px dashed var(--border);
  border-radius:8px;color:var(--dim);font-size:13px;cursor:pointer;transition:all .2s;margin-bottom:12px;}
.add-btn:hover{border-color:var(--accent);color:var(--accent);}
.budget-summary{background:var(--s2);border:1px solid var(--border);border-radius:8px;
  padding:10px 14px;margin-bottom:12px;font-size:13px;line-height:1.7;}
.memo-area{width:100%;background:var(--s2);border:1px solid var(--border);border-radius:8px;
  padding:10px;color:var(--text);font-size:13px;resize:vertical;min-height:56px;
  font-family:inherit;margin-bottom:12px;}
.memo-area:focus{outline:none;border-color:var(--accent);}
.save-btn{width:100%;padding:12px;background:linear-gradient(135deg,#7c3aed,#4f46e5);
  border:none;border-radius:9px;color:#fff;font-size:14px;font-weight:900;cursor:pointer;transition:all .2s;}
.save-btn:hover{opacity:.9;}

/* HISTORY */
.hist-box{background:var(--s1);border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:12px;}
.hist-item{background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:7px;}
.hist-head{display:flex;justify-content:space-between;margin-bottom:6px;align-items:center;}
.hist-venue{font-weight:700;color:var(--accent);font-size:13px;}
.hist-time{color:var(--dim);font-size:11px;}
.hist-slots{font-size:13px;line-height:1.8;}
.hist-memo{color:var(--dim);font-size:12px;margin-top:4px;padding-top:4px;border-top:1px solid var(--border);}
.clear-btn{background:none;border:1px solid var(--border);border-radius:6px;
  color:var(--dim);font-size:11px;padding:3px 8px;cursor:pointer;float:right;}
.clear-btn:hover{border-color:var(--red);color:var(--red);}

/* RESULT INPUT */
.result-btn{width:100%;padding:10px;background:var(--s2);border:1px solid var(--border);
  border-radius:8px;color:var(--dim);font-size:13px;cursor:pointer;margin-top:6px;transition:all .2s;}
.result-btn:hover{border-color:var(--green);color:var(--green);}
.result-form{background:var(--s3);border-radius:8px;padding:12px;margin-top:8px;display:none;}
.result-boats{display:flex;gap:6px;margin-bottom:8px;}
.res-input{width:44px;height:44px;background:var(--s1);border:1px solid var(--border);
  border-radius:7px;color:var(--text);font-size:18px;font-weight:900;text-align:center;font-family:monospace;}
.res-input:focus{outline:none;border-color:var(--accent);}
.res-save{background:var(--green);border:none;border-radius:7px;color:#000;
  font-weight:900;font-size:13px;padding:8px 16px;cursor:pointer;}

/* ERROR */
.error-box{background:rgba(239,68,68,.08);border:1px solid var(--red);border-radius:10px;
  padding:14px;color:var(--red);font-size:13px;margin-bottom:12px;}

/* DISCLAIMER */
footer{text-align:center;font-size:11px;color:var(--dim);padding:16px;
  border-top:1px solid var(--border);margin-top:8px;line-height:1.7;}

@media(max-width:640px){
  .sel-row{flex-direction:column;}
  .bet-types{grid-template-columns:repeat(3,1fr);}
}
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-mark">🚤</div>
    <div class="logo-text">競艇<em>AI</em>予想サポート</div>
  </div>
  <div class="badges">
    <span class="badge badge-live">● LIVE</span>
    <span class="badge badge-date" id="todayBadge">2026年4月22日</span>
  </div>
</header>

<div class="wrap">

  <!-- 会場選択 -->
  <div class="selector">
    <div class="sec-title">▍ 会場・レースを選択</div>
    <div class="sel-row">
      <div class="sel-grp" style="flex:2">
        <label>会場</label>
        <select id="venueSelect">
          <option value="">-- 会場を選択 --</option>
          <option value="1">桐生</option><option value="2">戸田</option>
          <option value="3">江戸川</option><option value="4">平和島</option>
          <option value="5">多摩川</option><option value="6">浜名湖</option>
          <option value="7">蒲郡</option><option value="8">常滑</option>
          <option value="9">津</option><option value="10">三国</option>
          <option value="11">びわこ</option><option value="12">住之江</option>
          <option value="13">尼崎</option><option value="14">鳴門</option>
          <option value="15">丸亀</option><option value="16">児島</option>
          <option value="17">宮島</option><option value="18">徳山</option>
          <option value="19">下関</option><option value="20">若松</option>
          <option value="21">芦屋</option><option value="22">福岡</option>
          <option value="23">唐津</option><option value="24">大村</option>
        </select>
      </div>
      <div class="sel-grp">
        <label>レース</label>
        <select id="raceSelect">
          <option value="">-- R --</option>
          <option value="1">1R</option><option value="2">2R</option>
          <option value="3">3R</option><option value="4">4R</option>
          <option value="5">5R</option><option value="6">6R</option>
          <option value="7">7R</option><option value="8">8R</option>
          <option value="9">9R</option><option value="10">10R</option>
          <option value="11">11R</option><option value="12">12R</option>
        </select>
      </div>
    </div>
    <button class="load-btn" id="loadBtn" onclick="loadRace()">データを取得する</button>
  </div>

  <!-- メインコンテンツ -->
  <div id="mainContent"></div>

  <!-- 予想履歴 -->
  <div class="hist-box" id="histBox" style="display:none">
    <div class="sec-title">▍ 今日の予想履歴 <button class="clear-btn" onclick="clearHistory()">全削除</button></div>
    <div id="histList"></div>
  </div>

  <footer>
    本ツールはBoatraceOpenAPI（非公式）のリアルタイムデータを使用しています。<br>
    予想はあくまで参考情報です。実際の投票は公式サービスをご利用ください。<br>
    © 競艇AI予想サポート — 無断転載・複製・商用利用を禁じます
  </footer>

</div>

<script>
// =====================================================
// 定数
// =====================================================
const VENUES = {
  1:"桐生",2:"戸田",3:"江戸川",4:"平和島",5:"多摩川",
  6:"浜名湖",7:"蒲郡",8:"常滑",9:"津",10:"三国",
  11:"びわこ",12:"住之江",13:"尼崎",14:"鳴門",15:"丸亀",
  16:"児島",17:"宮島",18:"徳山",19:"下関",20:"若松",
  21:"芦屋",22:"福岡",23:"唐津",24:"大村"
};
const WEATHER={1:"晴れ",2:"曇り",3:"雨",4:"霧",5:"雪"};
const WIND_DIR={
  1:"北",2:"北北東",3:"北東",4:"東北東",5:"東",6:"東南東",
  7:"南東",8:"南南東",9:"南",10:"南南西",11:"南西",12:"西南西",
  13:"西",14:"西北西",15:"北西",16:"北北西",17:"無風"
};
const CLASS={1:"A1",2:"A2",3:"B1",4:"B2"};
const BET_TYPES=[
  {id:"tansho",  label:"単勝",  desc:"1着",          sel:1,ord:false},
  {id:"fukusho", label:"複勝",  desc:"2着以内",      sel:1,ord:false},
  {id:"nitan",   label:"2連単", desc:"1〜2着順通り", sel:2,ord:true},
  {id:"nifuku",  label:"2連複", desc:"1〜2着順不問", sel:2,ord:false},
  {id:"santan",  label:"3連単", desc:"1〜3着順通り", sel:3,ord:true},
  {id:"sanfuku", label:"3連複", desc:"1〜3着順不問", sel:3,ord:false},
];
const SLOT_TYPES=[
  {id:"main",  label:"本線", cls:"tag-main"},
  {id:"sub",   label:"抑え", cls:"tag-sub"},
  {id:"kana",  label:"穴",   cls:"tag-kana"},
];

// =====================================================
// State
// =====================================================
let currentRace=null;
let currentBetType=BET_TYPES[4];
let selectedBoats=[];
let currentSlotType=SLOT_TYPES[0];
let betSlots=[];
let predictions=JSON.parse(localStorage.getItem('kyotei_preds')||'[]');

// =====================================================
// 今日の日付（JST）
// =====================================================
function getTodayJST(){
  const now=new Date();
  const jst=new Date(now.getTime()+9*60*60*1000);
  const y=jst.getUTCFullYear();
  const m=String(jst.getUTCMonth()+1).padStart(2,'0');
  const d=String(jst.getUTCDate()).padStart(2,'0');
  return {str:`${y}${m}${d}`,y,m,d};
}

(function init(){
  const {y,m,d}=getTodayJST();
  document.getElementById('todayBadge').textContent=`${y}年${parseInt(m)}月${parseInt(d)}日`;
  renderHistory();
})();

// =====================================================
// データ取得
// =====================================================
async function loadRace(){
  const venue=parseInt(document.getElementById('venueSelect').value);
  const race=parseInt(document.getElementById('raceSelect').value);
  if(!venue||!race){alert('会場とレース番号を選択してください');return;}

  const btn=document.getElementById('loadBtn');
  btn.disabled=true;btn.textContent='取得中…';

  document.getElementById('mainContent').innerHTML=`
    <div style="text-align:center;padding:50px 20px;color:var(--dim)">
      <div class="sp" style="width:36px;height:36px;border-width:3px;margin:0 auto 16px"></div>
      <div>リアルタイムデータ取得中…</div>
    </div>`;

  const {str:dateStr,y}=getTodayJST();
  const base=`https://boatraceopenapi.github.io`;
  const progUrl=`${base}/programs/v2/${y}/${dateStr}.json`;
  const prevUrl=`${base}/previews/v2/${y}/${dateStr}.json`;

  try{
    const [progRes,prevRes]=await Promise.all([
      fetch(progUrl),
      fetch(prevUrl).catch(()=>null)
    ]);
    if(!progRes.ok) throw new Error(`出走表データ取得失敗 (${progRes.status})`);

    const progData=await progRes.json();
    const prevData=prevRes?.ok ? await prevRes.json() : null;

    const program=progData.programs.find(
      p=>p.race_stadium_number===venue && p.race_number===race
    );
    if(!program){
      const available=progData.programs
        .filter(p=>p.race_stadium_number===venue)
        .map(p=>`${p.race_number}R`).join('・');
      throw new Error(
        `${VENUES[venue]} ${race}Rのデータが見つかりません。\n` +
        (available ? `本日の${VENUES[venue]}は：${available}` : '本日は開催していない可能性があります。')
      );
    }

    const preview=prevData?.previews?.find(
      p=>p.race_stadium_number===venue && p.race_number===race
    );

    currentRace={program,preview,venue,race,dateStr};
    selectedBoats=[];betSlots=[];
    currentBetType=BET_TYPES[4];currentSlotType=SLOT_TYPES[0];

    renderRace();
    generateAI();

  }catch(e){
    document.getElementById('mainContent').innerHTML=`
      <div class="error-box">❌ ${e.message.replace(/\n/g,'<br>')}</div>`;
  }
  btn.disabled=false;btn.textContent='データを取得する';
}

function renderRace(){
  const {program,preview,venue,race}=currentRace;
  const boats=program.boats;

  const wx=preview?WEATHER[preview.race_weather_number]||'--':'--';
  const wind=preview?`${WIND_DIR[preview.race_wind_direction_number]||'--'} ${preview.race_wind}m`:'--';
  const wave=preview?`${preview.race_wave}cm`:'--';
  const temp=preview?`${preview.race_temperature}℃`:'--';
  const wtemp=preview?`${preview.race_water_temperature}℃`:'--';
  const isRough=preview&&preview.race_wave>=10;
  const isWindy=preview&&preview.race_wind>=5;

  // 展示タイム最速
  let fastEx=999;
  if(preview?.boats){
    Object.values(preview.boats).forEach(b=>{
      if(b.racer_exhibition_time&&b.racer_exhibition_time<fastEx)fastEx=b.racer_exhibition_time;
    });
  }

  const f=v=>parseFloat(v||0);
  const rows=boats.map(b=>{
    const lane=b.racer_boat_number;
    const cls=CLASS[b.racer_class_number]||'B1';
    const st=f(b.racer_average_start_timing);
    const stCls=st<=0.14?'st-f':st>=0.20?'st-s':'st-m';
    const motor2=f(b.racer_assigned_motor_top_2_percent);
    const pv=preview?.boats?.[String(lane)];
    const exT=pv?.racer_exhibition_time!=null?f(pv.racer_exhibition_time):null;
    const exST=pv?.racer_start_timing!=null?f(pv.racer_start_timing):null;
    const course=pv?.racer_course_number||lane;
    const exCls=exT!=null&&exT<=fastEx+0.04?'ex-top':'';
    const courseChanged=course!==lane;
    return `<tr>
      <td><span class="ln l${lane}">${lane}</span></td>
      <td style="text-align:left;font-weight:700">${b.racer_name||'--'}</td>
      <td><span class="rank ${cls}">${cls}</span></td>
      <td>${f(b.racer_national_top_1_percent).toFixed(2)}</td>
      <td>${f(b.racer_local_top_1_percent).toFixed(2)}</td>
      <td>${f(b.racer_national_top_2_percent).toFixed(1)}%</td>
      <td><span class="${stCls}">${st.toFixed(2)}</span></td>
      <td style="font-size:11px">F${b.racer_flying_count||0}/L${b.racer_late_count||0}</td>
      <td>${motor2.toFixed(1)}%<div class="bar"><div class="bar-fill bar-o" style="width:${Math.min(100,motor2)}%"></div></div></td>
      <td>${exT!=null?`<span class="${exCls}">${exT.toFixed(2)}</span>`:'--'}</td>
      <td>${exST!=null?`<span class="${exST<0?'st-f':''}">${exST.toFixed(2)}</span>`:'--'}</td>
      <td><span class="${courseChanged?'course-change':''}">${course}コース${courseChanged?'⚠':''}</span></td>
    </tr>`;
  }).join('');

  document.getElementById('mainContent').innerHTML=`
    <div class="race-head">
      <div class="race-name">🏟 ${VENUES[venue]}競艇場 ${race}R</div>
      <div class="race-sub">${program.race_title||''} ${program.race_subtitle||''} / ${program.race_distance}m</div>
      <div class="chips">
        <div class="chip ${isRough?'warn':''}">波 <strong>${wave}</strong></div>
        <div class="chip ${isWindy?'warn':''}">風 <strong>${wind}</strong></div>
        <div class="chip">天候 <strong>${wx}</strong></div>
        <div class="chip">気温 <strong>${temp}</strong></div>
        <div class="chip info">水温 <strong>${wtemp}</strong></div>
        ${isRough?'<div class="chip warn">⚠ 荒水面</div>':''}
        ${isWindy?'<div class="chip warn">⚠ 強風</div>':''}
      </div>
    </div>

    <div class="tbl-wrap">
      <table class="boat-table">
        <thead><tr>
          <th>枠</th><th>選手名</th><th>級別</th>
          <th>全国勝率</th><th>当地勝率</th><th>全国2連率</th>
          <th>平均ST</th><th>F/L</th><th>モーター2連率</th>
          <th>展示タイム</th><th>展示ST</th><th>進入</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>

    <div class="ai-box" id="aiBox">
      <div class="ai-head">
        <div class="ai-icon">🤖</div>
        <div class="ai-ttl">AI予想アドバイス<small>選手データ・天候・展示情報をもとに分析</small></div>
      </div>
      <div id="aiContent"><div class="spinner-wrap"><div class="sp"></div>分析中…</div></div>
    </div>

    ${renderBetBox()}
  `;
  renderHistory();
}

// =====================================================
async function generateAI(){
  const {program,preview,venue,race}=currentRace;
  const boats=program.boats;

  let fastEx=999;
  if(preview?.boats){
    Object.values(preview.boats).forEach(b=>{
      if(b.racer_exhibition_time&&b.racer_exhibition_time<fastEx)fastEx=b.racer_exhibition_time;
    });
  }

  const boatInfo=boats.map(b=>{
    const cls=CLASS[b.racer_class_number]||'B1';
    const pv=preview?.boats?.[String(b.racer_boat_number)];
    const ex=pv?`展示${pv.racer_exhibition_time}秒 展示ST${pv.racer_start_timing} ${pv.racer_course_number}コース進入`:'';
    return `${b.racer_boat_number}号艇 ${b.racer_name}(${cls}) 全国勝率${b.racer_national_top_1_percent} 当地勝率${b.racer_local_top_1_percent} 2連率${b.racer_national_top_2_percent}% ST${b.racer_average_start_timing} F${b.racer_flying_count} モーター2連${b.racer_assigned_motor_top_2_percent}% ${ex}`;
  }).join('\n');

  const wxInfo=preview
    ?`天候:${WEATHER[preview.race_weather_number]} 風:${WIND_DIR[preview.race_wind_direction_number]}${preview.race_wind}m 波:${preview.race_wave}cm 気温:${preview.race_temperature}℃`
    :'天候データなし';

  const prompt=`あなたは競艇（ボートレース）の予想専門家です。以下のデータを分析して予想アドバイスを提供してください。

【レース】${VENUES[venue]}競艇場 ${race}R / ${program.race_title||''} ${program.race_subtitle||''}
【コンディション】${wxInfo}

【出走選手データ】
${boatInfo}

以下の形式で400字程度で分析してください：

【注目選手・軸】誰が1着候補か、データと展示タイムから根拠とともに
【展開予想】スタートと1マークの展開、進入コース変更があれば影響も
【穴候補】データ上は低確率だが狙えそうな艇とその理由
【推奨買い目】本線2点・抑え2点・穴1点を具体的に（3連単推奨）
【配分アドバイス】予算の配分方法（本線重く・穴は少額など）`;

  const aiEl=document.getElementById('aiContent');
  if(!aiEl)return;

  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:1000,
        messages:[{role:'user',content:prompt}]
      })
    });
    if(!res.ok)throw new Error('API error');
    const data=await res.json();
    const text=data.content?.map(c=>c.text||'').join('')||'';
    aiEl.innerHTML=`<div class="ai-body">${text}</div>`;
  }catch(e){
    aiEl.innerHTML=`
      <div class="ai-body">${generateFallback()}</div>
      <div class="api-warn">
        ⚠ <strong>AI解説について：</strong>ブラウザからAnthropicAPIへの直接アクセスはCORS制限により動作しません。<br>
        Vercel等のサーバーにAPIプロキシを設置することで解決します。<br>
        <strong style="color:var(--text)">現在表示されているデータ（選手・天候・展示タイム等）は全て本物のリアルタイムデータです。</strong>
      </div>`;
  }
}

function generateFallback(){
  const {program,preview}=currentRace;
  const boats=program.boats;
  const a1=boats.filter(b=>b.racer_class_number===1);
  const topST=[...boats].sort((a,b)=>a.racer_average_start_timing-b.racer_average_start_timing)[0];
  const topMotor=[...boats].sort((a,b)=>b.racer_assigned_motor_top_2_percent-a.racer_assigned_motor_top_2_percent)[0];
  const isRough=preview&&preview.race_wave>=10;

  let text='';
  if(a1.length)text+=`【注目選手】A1級: ${a1.map(b=>`${b.racer_boat_number}号艇 ${b.racer_name}（全国勝率${b.racer_national_top_1_percent}）`).join('、')}が軸候補。\n\n`;
  text+=`【ST注目】平均STが最も良いのは${topST.racer_boat_number}号艇 ${topST.racer_name}（${topST.racer_average_start_timing}）。\n\n`;
  text+=`【モーター】2連率トップは${topMotor.racer_boat_number}号艇 ${topMotor.racer_name}（${topMotor.racer_assigned_motor_top_2_percent}%）。\n\n`;
  text+=`【天候影響】${isRough?'波高が高く荒れた水面。アウトコースの捲りが決まりやすい。インの逃げには注意。':'水面は比較的安定。実力通りの結果になりやすいコンディション。'}`;
  return text;
}

// =====================================================
// Bet Controls
// =====================================================
function selectBetType(id){
  currentBetType=BET_TYPES.find(t=>t.id===id);
  selectedBoats=[];
  rebuildBetBox();
}

function selectSlotType(id){
  currentSlotType=SLOT_TYPES.find(t=>t.id===id);
  rebuildBetBox();
}

function toggleBoat(lane){
  const needed=currentBetType.sel;
  const idx=selectedBoats.indexOf(lane);
  if(idx!==-1)selectedBoats.splice(idx,1);
  else{
    if(selectedBoats.length<needed)selectedBoats.push(lane);
    else{selectedBoats.shift();selectedBoats.push(lane);}
  }
  const bsHtml=[1,2,3,4,5,6].map(l=>{
    const si=selectedBoats.indexOf(l);const isOn=si!==-1;
    const ord=currentBetType.ord&&isOn?`<span class="ord">${si+1}着</span>`:'';
    return `<button class="bs ${isOn?'on':''}" data-l="${l}" onclick="toggleBoat(${l})">${l}${ord}</button>`;
  }).join('');
  document.getElementById('boatSel').innerHTML=bsHtml;
  const hint=currentBetType.ord
    ?`着順通りに選択（${currentBetType.sel}艇）— ${selectedBoats.join(' → ')||'未選択'}`
    :`${currentBetType.sel}艇を選択 — ${selectedBoats.length}/${currentBetType.sel}`;
  document.getElementById('selHint').textContent=hint;
  updateSummary();
}

function setBudget(v){const el=document.getElementById('budgetInput');if(el)el.value=v;updateSummary();}
function setAmt(v){const el=document.getElementById('amtInput');if(el)el.value=v;updateSummary();}

function addSlot(){
  if(selectedBoats.length!==currentBetType.sel){alert(`${currentBetType.sel}艇を選択してください`);return;}
  const amt=parseInt(document.getElementById('amtInput').value)||100;
  if(amt<100){alert('100円以上入力してください');return;}
  const sep=currentBetType.ord?' → ':' - ';
  betSlots.push({
    betType:{...currentBetType},
    slotType:{...currentSlotType},
    boats:selectedBoats.join(sep),
    amount:amt
  });
  selectedBoats=[];
  rebuildBetBox();
}

function removeSlot(idx){betSlots.splice(idx,1);rebuildBetBox();}

function updateSummary(){
  const budget=parseInt(document.getElementById('budgetInput')?.value||0)||0;
  const total=betSlots.reduce((a,s)=>a+s.amount,0);
  const remain=budget-total;
  const el=document.querySelector('.budget-summary');
  if(!el)return;
  el.innerHTML=`
    合計 <strong style="color:var(--gold)">${total.toLocaleString()}円</strong>
    ${budget>0?`/ 予算 ${budget.toLocaleString()}円
    → 残り <strong style="color:${remain>=0?'var(--green)':'var(--red)'}">${remain.toLocaleString()}円</strong>`:''}
    <br>
    本線 ${betSlots.filter(s=>s.slotType.id==='main').length}点 ·
    抑え ${betSlots.filter(s=>s.slotType.id==='sub').length}点 ·
    穴 ${betSlots.filter(s=>s.slotType.id==='kana').length}点`;
}

function rebuildBetBox(){
  // betbox部分だけ再レンダリング
  const existing=document.querySelector('.bet-box');
  if(!existing)return;
  const tmp=document.createElement('div');
  tmp.innerHTML=renderBetBox();
  existing.replaceWith(tmp.firstElementChild);
}

// =====================================================
// 予想保存
// =====================================================
function savePred(){
  if(betSlots.length===0){alert('買い目を追加してください');return;}
  const {venue,race,dateStr}=currentRace;
  const memo=document.getElementById('memoArea')?.value||'';
  const budget=parseInt(document.getElementById('budgetInput')?.value||0)||0;

  const pred={
    id:Date.now(),
    date:dateStr,
    venue:VENUES[venue],race:`${race}R`,
    slots:betSlots.map(s=>({...s})),
    budget,memo,
    total:betSlots.reduce((a,s)=>a+s.amount,0),
    createdAt:new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'}),
    result:null
  };

  predictions.unshift(pred);
  if(predictions.length>100)predictions=predictions.slice(0,100);
  localStorage.setItem('kyotei_preds',JSON.stringify(predictions));

  betSlots=[];selectedBoats=[];
  if(document.getElementById('memoArea'))document.getElementById('memoArea').value='';
  rebuildBetBox();
  renderHistory();
  alert('✅ 予想を保存しました！');
}

// =====================================================
// 履歴
// =====================================================
function renderHistory(){
  const {str:today}=getTodayJST();
  const todayPreds=predictions.filter(p=>p.date===today);
  const box=document.getElementById('histBox');
  const list=document.getElementById('histList');
  if(!box||!list)return;

  if(todayPreds.length===0){box.style.display='none';return;}
  box.style.display='block';

  list.innerHTML=todayPreds.map((p,pi)=>`
    <div class="hist-item">
      <div class="hist-head">
        <span class="hist-venue">🏟 ${p.venue} ${p.race}</span>
        <span class="hist-time">${p.createdAt} / 合計${p.total.toLocaleString()}円</span>
      </div>
      <div class="hist-slots">
        ${p.slots.map(s=>`<span class="slot-tag ${s.slotType.cls}" style="font-size:10px;padding:1px 5px">${s.slotType.label}</span>
          【${s.betType.label}】${s.boats} ${s.amount.toLocaleString()}円`).join('<br>')}
      </div>
      ${p.memo?`<div class="hist-memo">📝 ${p.memo}</div>`:''}
      ${p.result?`<div style="color:var(--green);font-size:12px;margin-top:4px">✅ 結果: ${p.result}</div>`:''}
      <button class="result-btn" onclick="toggleResult(${pi})">📊 結果を入力する</button>
      <div class="result-form" id="resForm${pi}">
        <div style="font-size:12px;color:var(--dim);margin-bottom:8px">着順を入力（1着→2着→3着）</div>
        <div class="result-boats">
          <input class="res-input" id="res1_${pi}" maxlength="1" placeholder="1">
          <span style="color:var(--dim);align-self:center">→</span>
          <input class="res-input" id="res2_${pi}" maxlength="1" placeholder="2">
          <span style="color:var(--dim);align-self:center">→</span>
          <input class="res-input" id="res3_${pi}" maxlength="1" placeholder="3">
        </div>
        <button class="res-save" onclick="saveResult(${pi})">保存</button>
      </div>
    </div>`).join('');
}

function toggleResult(idx){
  const form=document.getElementById(`resForm${idx}`);
  if(form)form.style.display=form.style.display==='block'?'none':'block';
}

function saveResult(idx){
  const {str:today}=getTodayJST();
  const todayPreds=predictions.filter(p=>p.date===today);
  if(!todayPreds[idx])return;
  const r1=document.getElementById(`res1_${idx}`)?.value||'';
  const r2=document.getElementById(`res2_${idx}`)?.value||'';
  const r3=document.getElementById(`res3_${idx}`)?.value||'';
  todayPreds[idx].result=`${r1}-${r2}-${r3}`;
  // predictionsの対応エントリを更新
  const globalIdx=predictions.findIndex(p=>p.id===todayPreds[idx].id);
  if(globalIdx!==-1)predictions[globalIdx].result=todayPreds[idx].result;
  localStorage.setItem('kyotei_preds',JSON.stringify(predictions));
  renderHistory();
}

function clearHistory(){
  if(!confirm('今日の予想履歴を全て削除しますか？'))return;
  const {str:today}=getTodayJST();
  predictions=predictions.filter(p=>p.date!==today);
  localStorage.setItem('kyotei_preds',JSON.stringify(predictions));
  renderHistory();
}
</script>
